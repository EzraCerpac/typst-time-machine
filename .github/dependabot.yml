version: 2

updates:
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    groups:
      rust-dependencies:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    ignore:
      # This tag is the minimum supported Rust version, not an action release.
      - dependency-name: dtolnay/rust-toolchain
    groups:
      actions:
        patterns: ["*"]
