name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          archive="ttm-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" ttm
          shasum -a 256 "$archive" > "$archive.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ttm-${{ matrix.target }}
          path: |
            ttm-*.tar.gz
            ttm-*.sha256

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: actions/checkout@v4
        with:
          path: source
      - name: Generate Homebrew formula
        shell: bash
        run: source/scripts/render-homebrew-formula "${GITHUB_REF_NAME#v}" > typst-time-machine.rb
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ttm-*.tar.gz
            ttm-*.sha256
            typst-time-machine.rb
