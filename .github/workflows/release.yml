name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@1.92.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify tag matches crate version
        shell: bash
        run: |
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          test "$GITHUB_REF_NAME" = "v${crate_version}"
      - run: cargo package --locked
      - name: Verify embedded frontend is current
        run: git diff --exit-code -- web/dist

  build:
    name: Build (${{ matrix.target }})
    needs: validate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          package="ttm-${{ matrix.target }}"
          archive="${package}.tar.gz"
          mkdir "$package"
          cp "target/${{ matrix.target }}/release/ttm" "$package/"
          cp README.md LICENSE "$package/"
          tar -czf "$archive" "$package"
          shasum -a 256 "$archive" > "$archive.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: ttm-${{ matrix.target }}
          if-no-files-found: error
          path: |
            ttm-*.tar.gz
            ttm-*.sha256

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
      - uses: actions/checkout@v7
        with:
          path: source
      - name: Generate Homebrew formula
        shell: bash
        run: source/scripts/render-homebrew-formula "${GITHUB_REF_NAME#v}" > typst-time-machine.rb
      - uses: softprops/action-gh-release@v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            ttm-*.tar.gz
            ttm-*.sha256
            typst-time-machine.rb
