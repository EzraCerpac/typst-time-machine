name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # 1.92.0
        with:
          toolchain: 1.92.0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Verify tag matches crate version
        if: github.event_name == 'push'
        shell: bash
        run: |
          crate_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          test "$GITHUB_REF_NAME" = "v${crate_version}"
      - run: cargo package --locked
      - name: Verify embedded frontend is current
        run: git diff --exit-code -- web/dist

  build:
    name: Build (${{ matrix.target }})
    needs: validate
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          package="ttm-${{ matrix.target }}"
          archive="${package}.tar.gz"
          mkdir "$package"
          cp "target/${{ matrix.target }}/release/ttm" "$package/"
          cp README.md LICENSE "$package/"
          tar -czf "$archive" "$package"
          shasum -a 256 "$archive" > "$archive.sha256"
      - name: Smoke-test archive
        shell: bash
        run: |
          package="ttm-${{ matrix.target }}"
          archive="${package}.tar.gz"
          expected_version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          extracted="$(mktemp -d)"
          shasum -a 256 -c "$archive.sha256"
          tar -xzf "$archive" -C "$extracted"
          test -x "$extracted/$package/ttm"
          test -s "$extracted/$package/README.md"
          test -s "$extracted/$package/LICENSE"
          test "$("$extracted/$package/ttm" --version)" = "ttm $expected_version"
          "$extracted/$package/ttm" --help >/dev/null
      - name: Attest release archive
        if: github.event_name == 'push' && github.event.repository.visibility == 'public'
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4
        with:
          subject-path: ttm-${{ matrix.target }}.tar.gz
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ttm-${{ matrix.target }}
          if-no-files-found: error
          path: |
            ttm-*.tar.gz
            ttm-*.sha256

  publish:
    name: Publish GitHub release
    needs: build
    if: github.event_name == 'push' && github.ref_type == 'tag'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: source
      - name: Verify release checksums
        run: shasum -a 256 -c ttm-*.sha256
      - name: Generate Homebrew formula
        shell: bash
        run: source/scripts/render-homebrew-formula "${GITHUB_REF_NAME#v}" > typst-time-machine.rb
      - name: Validate Homebrew formula syntax
        run: ruby -c typst-time-machine.rb
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: |
            ttm-*.tar.gz
            ttm-*.sha256
            typst-time-machine.rb

  publish-homebrew:
    name: Publish Homebrew formula
    needs: publish
    if: github.event.repository.visibility == 'public'
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          merge-multiple: true
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: source
      - name: Generate Homebrew formula
        shell: bash
        run: source/scripts/render-homebrew-formula "${GITHUB_REF_NAME#v}" > typst-time-machine.rb
      - name: Require tap deploy key
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        shell: bash
        run: |
          if [ -z "$HOMEBREW_TAP_DEPLOY_KEY" ]; then
            echo "::error::HOMEBREW_TAP_DEPLOY_KEY is not configured"
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: EzraCerpac/homebrew-tap
          ssh-key: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
          path: tap
      - name: Validate and install formula
        shell: bash
        run: |
          ruby -c typst-time-machine.rb
          brew style typst-time-machine.rb
          brew install --formula ./typst-time-machine.rb
          test "$(ttm --version)" = "ttm ${GITHUB_REF_NAME#v}"
      - name: Publish formula
        shell: bash
        run: |
          cp typst-time-machine.rb tap/Formula/typst-time-machine.rb
          cd tap
          git add Formula/typst-time-machine.rb
          if git diff --cached --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "typst-time-machine ${GITHUB_REF_NAME#v}"
          git push
